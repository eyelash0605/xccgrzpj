<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="作品展示 - 夏楚晨">
  <title>作品展示 - 夏楚晨</title>

  <!-- CSS 文件引用 -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="g-nav g-nav--scrolled">
    <div class="g-nav__container">
      <ul class="g-nav__list">
        <li><a href="index.html" class="g-nav__item">关于我</a></li>
        <li><a href="experience.html" class="g-nav__item">经历</a></li>
        <li><a href="works.html" class="g-nav__item g-nav__item--active">作品</a></li>
        <li><a href="contact.html" class="g-nav__item">联系</a></li>
      </ul>
    </div>
  </nav>

  <!-- 背景层 -->
  <div class="g-bg-layer">
    <div class="g-bg-image" id="works-bg"></div>
  </div>

  <!-- 内容层 -->
  <main class="g-content" style="padding-top: 80px;">
    <div class="g-container">

      <!-- 作品展示 -->
      <section class="m-works">
        <div class="m-header">
          <h2 class="m-title">作品展示</h2>
          <p class="m-subtitle">什么都做过一点点</p>
        </div>

        <!-- 分类方块 -->
        <div class="m-works__categories" id="works-categories">
          <div class="m-works__category-card" data-category="brand">
            <h3>平面设计</h3>
            <p>logo/vi/海报/推图</p>
          </div>
          <div class="m-works__category-card" data-category="ecommerce">
            <h3>电商美工</h3>
            <p>详情页 / 主图</p>
          </div>
          <div class="m-works__category-card" data-category="poster">
            <h3>衍生品设计</h3>
            <p>徽章/亚克力立牌/钥匙扣/包装<br>印刷白墨/工艺设计</p>
          </div>
          <div class="m-works__category-card" data-category="photo">
            <h3>摄影</h3>
            <p>摄影 / 后期</p>
          </div>
          <div class="m-works__category-card" data-category="video">
            <h3>视频</h3>
            <p>剪辑/制作</p>
          </div>
        </div>

        <!-- 瀑布流区域 -->
        <div class="m-works__masonry" id="works-masonry">
          <button class="m-works__back" id="works-back">← 返回</button>
          <h3 class="m-works__masonry-title" id="masonry-title"></h3>
          <div class="m-works__masonry-grid" id="masonry-grid"></div>
        </div>

        <!-- 图片预览遮罩 -->
        <div class="m-works__preview" id="works-preview">
          <button class="m-works__preview-close" aria-label="关闭">×</button>
          <img class="m-works__preview-img" id="preview-img" src="" alt="">
        </div>

      </section>

    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
